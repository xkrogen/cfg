onboarding = false

# On rdev/Linux, "auto" (the default) keeps new pane shells non-login. This
# LinkedIn rdev only adds GULL-installed tool dirs (e.g. /export/content/
# linkedin/bin, where captain lives) via a login-only shell init step, so
# non-login panes were missing them entirely -- breaking anything that
# execs those tools directly with no further shell in between, like an
# MCP server spawn from within a Copilot session. Force login shells for
# every new pane so they get the same PATH a real `ssh` session would.
[terminal]
shell_mode = "login"

# Mirrors ~/.tmux.conf: prefix is Ctrl+a (not the herdr/tmux default Ctrl+b),
# plus the same non-prefix chords tmux used for pane focus, tab switching,
# and pane resizing. tmux features with no herdr equivalent (synchronize-panes,
# paste-buffer, and reordering tabs in place) are intentionally left out.
[keys]
prefix = "ctrl+a"

focus_pane_left = ["prefix+h", "alt+shift+left"]
focus_pane_down = ["prefix+j", "alt+shift+down"]
focus_pane_up = ["prefix+k", "alt+shift+up"]
focus_pane_right = ["prefix+l", "alt+shift+right"]

next_tab = ["prefix+n", "alt+tab"]
previous_tab = ["prefix+p", "alt+shift+tab"]

# Cycle through agents in the sidebar agent panel (distinct from pane focus).
next_agent = "prefix+a"
previous_agent = "prefix+shift+a"

# Indexed jumps: switch_tab is already a default binding; workspace and
# agent jumps are unset by default and must be bound explicitly.
switch_workspace = "prefix+shift+1..9"
focus_agent = "prefix+alt+1..9"

# tmux's default split bindings (unchanged in your tmux.conf): prefix+%
# splits side-by-side, prefix+" splits stacked. Kept alongside herdr's own
# prefix+v / prefix+minus defaults.
split_vertical = ["prefix+v", "prefix+%"]
split_horizontal = ["prefix+minus", "prefix+\""]

# tmux defaults: prefix+, renames the current window, prefix+d detaches.
# Kept alongside herdr's own prefix+shift+t / prefix+q defaults.
rename_tab = ["prefix+shift+t", "prefix+comma"]

# Switch to the last-focused pane (across tabs/workspaces) -- unset by
# default. Paired with the "ping" custom command below: press prefix+u to
# background-check a pane (send a real, near-instant shell command so herdr's
# screen-scan state detection has something to catch), then prefix+shift+u
# to jump back to wherever you were. Can't be one keypress: [[keys.command]]
# runs as a separate process talking only to herdr's socket API, which has
# no method for "last focused pane" -- that's tracked and executed entirely
# inside the running client's own UI loop, not exposed for scripts to call.
last_pane = "prefix+shift+u"

[[keys.command]]
key = "prefix+u"
type = "shell"
description = "ping current pane (trigger done/unread state when backgrounded)"
command = '''
"$HERDR_BIN_PATH" pane send-text "$HERDR_ACTIVE_PANE_ID" "!sleep 5"
sleep 0.1
"$HERDR_BIN_PATH" pane send-keys "$HERDR_ACTIVE_PANE_ID" enter
'''
detach = ["prefix+q", "prefix+d"]

[[keys.command]]
key = "ctrl+shift+left"
type = "shell"
command = "herdr pane resize --direction left --amount 0.05"
description = "resize pane left"

[[keys.command]]
key = "ctrl+shift+right"
type = "shell"
command = "herdr pane resize --direction right --amount 0.05"
description = "resize pane right"

[[keys.command]]
key = "ctrl+shift+up"
type = "shell"
command = "herdr pane resize --direction up --amount 0.05"
description = "resize pane up"

[[keys.command]]
key = "ctrl+shift+down"
type = "shell"
command = "herdr pane resize --direction down --amount 0.05"
description = "resize pane down"

[ui]
show_agent_labels_on_pane_borders = true
agent_panel_sort = "spaces"
[ui.toast]
delivery = "system"

[ui.sound]
enabled = true

[experimental]
switch_ascii_input_source_in_prefix = false
pane_history = true
