# Ensure `tmux` invocations from inside run-shell / if-shell / plugin
# scripts resolve to the same binary that's running the server. On rdev
# the default PATH in tmux-spawned subprocesses is the sshd-bare-bones
# one with no linuxbrew — so `tmux` picks up /usr/local/bin/tmux 3.2a and
# either targets the wrong socket or mismatches the server version, which
# breaks tpm and any in-config `run-shell "tmux ..."`. Only add linuxbrew
# if the dir exists (so this is a no-op on macOS, where homebrew lives
# elsewhere and PATH inheritance works fine).
if-shell "[ -d /home/linuxbrew/.linuxbrew/bin ]" \
    "set-environment -g PATH '/home/linuxbrew/.linuxbrew/bin:/usr/local/bin:/usr/bin:/bin'"

# Expose TMUX_VERSION for the `if-shell` blocks below. `-F` tells
# set-environment to expand `#{version}` as a tmux format string; without
# it the literal `#{version}` ends up in the environment.
set-environment -g -F TMUX_VERSION "#{version}"

set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features ',xterm*:extkeys'

# Required to fix some odd issue on Linux, see https://github.com/tmux/tmux/issues/597
# Other similar issues:
# - https://github.com/tmux/tmux/issues/2137
# - https://github.com/tmux/tmux/issues/321
# - https://stackoverflow.com/questions/45931164/duplicated-characters-and-non-updating-input-using-tmux-in-zsh
# if-shell -b '[ "$(uname)" = "Darwin" ]' \
#   '' \
#   'set -g default-terminal "screen-256color"'
set -g default-terminal "tmux-256color"

set -g prefix C-a
bind C-a send-prefix
unbind C-b

# Change the copy to also copy to system clipboard
# from 2.3 -> 2.4, emacs-copy became copy-mode
if-shell -b '[ `echo "$TMUX_VERSION < 2.4" | bc` = 1 ]' \
  'unbind -t emacs-copy M-w; \
    if-shell "uname | grep -q Darwin" \
      "bind -t emacs-copy M-w copy-pipe \"reattach-to-user-namespace pbcopy\"" \
      "bind -t emacs-copy M-w copy-pipe \"DISPLAY=:0 xclip\""' \
  'unbind -T copy-mode M-w; \
    if-shell "uname | grep -q Darwin" \
      "bind -T copy-mode M-w send -X copy-pipe-and-cancel \"reattach-to-user-namespace pbcopy\"" \
      "bind -T copy-mode M-w send -X copy-pipe-and-cancel \"DISPLAY=:0 xclip\""'
bind y paste-buffer

if-shell -b '[ `echo "$TMUX_VERSION < 2.4" | bc` = 1 ]' \
  'bind -t emacs-copy M-Left previous-word; \
   bind -t emacs-copy M-Right next-word; \
   bind -t emacs-copy a start-of-line' \
  'bind -T copy-mode M-Left send -X previous-word; \
   bind -T copy-mode M-Right send -X next-word; \
   bind -T copy-mode a send -X start-of-line'

bind s setw synchronize-panes

# Switch between panes with Alt+Shift
bind -n M-S-Left select-pane -L
bind -n M-S-Right select-pane -R
bind -n M-S-Up select-pane -U
bind -n M-S-Down select-pane -D

# Something between iTerm2, zsh, and tmux don't recognize the
# M-S-<DIR> combination, so create custom keybindings for them.

# Shift-Alt + [Left, Right, Up, Down] -> select pane
set -s user-keys[0] "\e[1;10D"
set -s user-keys[1] "\e[1;10C"
set -s user-keys[2] "\e[1;10A"
set -s user-keys[3] "\e[1;10B"

bind -n User0 select-pane -L
bind -n User1 select-pane -R
bind -n User2 select-pane -U
bind -n User3 select-pane -D

# Option-Tab -> next window
# CSI u format: \e[9;3u (Tab=9, Alt=modifier 3)
bind -n M-Tab next-window
set -s user-keys[6] "\e[9;3u"
bind -n User6 next-window

# Shift-Option-Tab -> previous window
# iTerm2 configured to send \e[9;4u (CSI u: Tab=9, Alt+Shift=modifier 4)
# tmux natively recognizes this as M-BTab
bind -n M-BTab previous-window

# Prefix + < / > -> reorder windows left/right
bind < swap-window -t -1\; select-window -t -1
bind > swap-window -t +1\; select-window -t +1

# Resize panes with Ctrl+Shift
bind -n C-S-Left resize-pane -L 5
bind -n C-S-Right resize-pane -R 5
bind -n C-S-Up resize-pane -U 5
bind -n C-S-Down resize-pane -D 5

set -g base-index 1
set -g renumber-windows on
set -g history-limit 50000

# don't rename windows automatically
set-option -g allow-rename off

# tmux >=2.1 mouse mode
# set -g mouse on
# tmux < 2.1 mouse mode
# set -g mouse-select-window on
# set -g mouse-select-pane on

setw -g xterm-keys on
setw -g mode-keys emacs

# Set status bar
set -g status-bg white
set -g status-fg black
# Highlight active window
set-window-option -g window-status-current-style bg=red

# Make active pane obvious
# Active pane: bright green border
set -g pane-active-border-style fg=colour46
# Inactive panes: dim grey border
set -g pane-border-style fg=colour240
# Slightly dim inactive pane content
set -g window-style 'fg=colour242,bg=colour235'
set -g window-active-style 'fg=terminal,bg=terminal'

set -g focus-events on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run '~/.tmux/plugins/tpm/tpm'
